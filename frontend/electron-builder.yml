# Electron Builder Configuration
# Cross-platform packaging for Windows, macOS, and Linux
appId: com.pptnarrator.app
productName: PPT演讲助手
copyright: Copyright © 2025

directories:
  buildResources: build
  output: release

files:
  - dist
  - dist-electron
  - '!**/.vscode/*'
  - '!src/*'
  - '!node_modules/*'
  - node_modules/sql.js/dist/sql-wasm.wasm

asar: true
asarUnpack:
  - '**/*.wasm'

# ===== macOS =====
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - x64
        - arm64

dmg:
  artifactName: PPT演讲助手-${version}-mac.${ext}

# ===== Windows =====
win:
  executableName: ppt-narrator
  target:
    - target: zip
      arch:
        - x64
  artifactName: PPT演讲助手-${version}-win.${ext}

# ===== Linux =====
linux:
  target:
    - AppImage
    - deb
  category: Office
  maintainer: ppt-narrator@example.com

appImage:
  artifactName: PPT演讲助手-${version}-linux.${ext}

deb:
  artifactName: PPT演讲助手-${version}-linux.${ext}
